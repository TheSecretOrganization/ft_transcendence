name: ft


services:
  db:
    image: postgres:16.3
    init: true
    restart: unless-stopped
    ports:
      - 5432:5432
    networks:
      - network
    volumes:
      - postgres_vol:/var/lib/postgresql
    env_file:
      - .env

  web:
    container_name: django
    build: django
    init: true
    restart: unless-stopped
    expose:
      - 8000
    networks:
      - network
    volumes:
      - django_src:/app
      - static_vol:/static
    env_file:
      - .env
    depends_on:
      - db

  nginx:
    container_name: nginx
    build: nginx
    init: true
    restart: unless-stopped
    ports:
      - 80:80
    networks:
      - network
    volumes:
      - static_vol:/static
    depends_on:
      - web


volumes:
  postgres_vol:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ./postgres

  django_src:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ./django/src

  static_vol:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ./django/src/static

  django_media:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ./django/src/media


networks:
  network:
    name: network
    driver: bridge
